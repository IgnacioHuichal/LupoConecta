deploy_to_lightsail:
  stage: deploy
  image: alpine  # Imagen ligera con SSH
  before_script:
    - apk add --no-cache openssh-client rsync git nodejs npm
    - eval $(ssh-agent -s)
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/lightsail_key
    - chmod 600 ~/.ssh/lightsail_key
    - ssh-add ~/.ssh/lightsail_key
  script:
    - ssh -o StrictHostKeyChecking=no ubuntu@54.158.56.182NCIA << EOF
      cd /home/ubuntu/tu-repo-astro
      git pull origin develop
      npm install
      npm run build
      sudo cp -r dist/* /var/www/html/
      EOF
  only:
    - develop  # Solo se ejecuta en pushes a main