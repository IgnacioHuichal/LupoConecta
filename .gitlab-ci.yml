image: node:18

stages:
  - build
  - deploy

before_script:
  - apt-get update -yq && apt-get install -yq openssh-client rsync
  - mkdir -p ~/.ssh
  - echo "$DEPLOY_KEY" | tr -d '\r' > ~/.ssh/id_rsa
  - chmod 600 ~/.ssh/id_rsa
  - ssh-keyscan -H 54.158.56.182 >> ~/.ssh/known_hosts

build:
  stage: build
  script:
    - npm install
    - npx astro build
  artifacts:
    paths:
      - dist/

deploy:
  stage: deploy
  script:
    - rsync -avz --delete dist/ ubuntu@54.158.56.182:/var/www/html/